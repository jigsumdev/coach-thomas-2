name = "coach-thomas-2"
compatibility_date = "2024-03-20"

# Pages: build output (Astro → dist). Cloudflare Pages reads this for Git builds.
pages_build_output_dir = "dist"

# Satisfies `wrangler deploy` when CI runs it instead of `wrangler pages deploy`;
# same folder as the static site build output.
[assets]
directory = "./dist"
